name: Build Android & iOS Packages

# 觸發時機：推送到 main 分支，或手動觸發
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────
  # Android：輸出 APK（測試安裝用）與 AAB（上架 Google Play 用）
  # ───────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build AAB (release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ───────────────────────────────────────────────
  # iOS：輸出未簽署的 IPA
  # 注意：要產出「可安裝/可上架」的 IPA，必須先在 GitHub Secrets
  # 設定好以下項目，並在下方步驟還原憑證：
  #   - IOS_DIST_CERTIFICATE_BASE64（.p12 憑證 base64）
  #   - IOS_DIST_CERTIFICATE_PASSWORD
  #   - IOS_PROVISIONING_PROFILE_BASE64
  #   - IOS_TEAM_ID
  # 目前先提供「不簽署」的編譯流程，確保 Flutter 端程式碼本身沒問題；
  # 簽署設定請依 Apple Developer 帳號實際狀況再補上。
  # ───────────────────────────────────────────────
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA (unsigned)
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r app-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: build/ios/iphoneos/app-unsigned.ipa
