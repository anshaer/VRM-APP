<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
  <!--
    說明：此檔案是 VRM 模型的渲染舞台，由 Flutter WebView 載入。
    CDN 版本先求快速能動，正式上架建議改成把 three.js / three-vrm
    打包進 assets 內離線使用，避免使用者沒網路時模型載不出來。
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    let scene, camera, renderer, currentVrm;

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(30.0, window.innerWidth / window.innerHeight, 0.1, 20.0);
      camera.position.set(0.0, 1.3, 1.6);

      renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      const light = new THREE.DirectionalLight(0xffffff, Math.PI);
      light.position.set(1.0, 1.0, 1.0).normalize();
      scene.add(light);
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    // 由 Flutter 端呼叫：載入指定路徑的 .vrm 檔
    window.loadVrmFromPath = function (path) {
      const loader = new GLTFLoader();
      loader.register((parser) => new VRMLoaderPlugin(parser));

      loader.load(
        path,
        (gltf) => {
          const vrm = gltf.userData.vrm;
          if (currentVrm) {
            scene.remove(currentVrm.scene);
            VRMUtils.deepDispose(currentVrm.scene);
          }
          VRMUtils.rotateVRM0(vrm); // 處理舊版 VRM0 朝向問題
          currentVrm = vrm;
          scene.add(vrm.scene);
        },
        (progress) => {
          // 可選：回拋載入進度給 Flutter
        },
        (error) => {
          console.error('VRM 載入失敗', error);
        }
      );
    };

    // 由 Flutter 端呼叫：套用人臉追蹤參數到目前模型
    // params 範例: { headYaw, headPitch, headRoll, eyeBlinkL, eyeBlinkR, mouthOpen }
    window.updateFaceParams = function (params) {
      if (!currentVrm) return;
      const humanoid = currentVrm.humanoid;
      const head = humanoid?.getNormalizedBoneNode('head');
      if (head && params.headYaw !== undefined) {
        head.rotation.set(
          params.headPitch || 0,
          params.headYaw || 0,
          params.headRoll || 0
        );
      }
      const expr = currentVrm.expressionManager;
      if (expr) {
        if (params.eyeBlinkL !== undefined) expr.setValue('blinkLeft', params.eyeBlinkL);
        if (params.eyeBlinkR !== undefined) expr.setValue('blinkRight', params.eyeBlinkR);
        if (params.mouthOpen !== undefined) expr.setValue('aa', params.mouthOpen);
        expr.update();
      }
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
