<script type="module">
    // ... 其他程式碼保持不變 ...

    // 改進版的 rigRotation（使用 getNormalizedBoneNode 更穩定）
    const rigRotation = (boneName, rotation = {x:0, y:0, z:0}, damp = 1.0, slerp = 0.3) => {
        if (!currentVrm || !rotation) return;
        const boneNode = currentVrm.humanoid.getNormalizedBoneNode(boneName);
        if (!boneNode) return;

        const euler = new THREE.Euler(
            (rotation.x || 0) * damp,
            (rotation.y || 0) * damp,
            (rotation.z || 0) * damp,
            'XYZ'
        );
        const targetQuat = new THREE.Quaternion().setFromEuler(euler);
        boneNode.quaternion.slerp(targetQuat, slerp);
    };

    const onResults = (results) => {
        // ==================== 1. 繪製除錯骨架 ====================
        if (canvasElement.width !== videoElement.videoWidth) {
            canvasElement.width = videoElement.videoWidth || 640;
            canvasElement.height = videoElement.videoHeight || 480;
        }
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.faceLandmarks) drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
        if (results.poseLandmarks) drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        if (results.leftHandLandmarks) drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#CC0000', lineWidth: 3});
        if (results.rightHandLandmarks) drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#00CC00', lineWidth: 3});
        canvasCtx.restore();

        if (!currentVrm) return;

        // ==================== 2. 臉部（含眨眼） ====================
        if (results.faceLandmarks) {
            const riggedFace = Kalidokit.Face.solve(results.faceLandmarks, { 
                runtime: "mediapipe", 
                video: videoElement 
            });

            if (riggedFace) {
                rigRotation("neck", riggedFace.head, 0.7, 0.4);
                rigRotation("head", riggedFace.head, 0.7, 0.4);

                // 眨眼修正（Kalidokit 輸出 0=閉眼 → VRM 需要 1=閉眼）
                let blinkL = Math.max(0, 1 - (riggedFace.eye.l || 0));
                let blinkR = Math.max(0, 1 - (riggedFace.eye.r || 0));

                // 加入穩定，避免抖動
                blinkL = blinkL < 0.15 ? 0 : blinkL;
                blinkR = blinkR < 0.15 ? 0 : blinkR;

                currentVrm.expressionManager.setValue('blinkLeft', blinkL);
                currentVrm.expressionManager.setValue('blinkRight', blinkR);

                // 嘴巴
                currentVrm.expressionManager.setValue('aa', riggedFace.mouth.shape.A || 0);
                currentVrm.expressionManager.setValue('ih', riggedFace.mouth.shape.I || 0);
                currentVrm.expressionManager.setValue('ou', riggedFace.mouth.shape.U || 0);
                currentVrm.expressionManager.setValue('ee', riggedFace.mouth.shape.E || 0);
                currentVrm.expressionManager.setValue('oh', riggedFace.mouth.shape.O || 0);
            }
        }

        // ==================== 3. 身體 Pose ====================
        const pose3D = results.poseWorldLandmarks;   // MediaPipe Holistic 主要用這個
        const pose2D = results.poseLandmarks;

        if (pose3D && pose2D) {
            const riggedPose = Kalidokit.Pose.solve(pose3D, pose2D, { 
                runtime: "mediapipe", 
                video: videoElement,
                enableLegs: true   // 重要！開啟腿部
            });

            if (riggedPose) {
                // 核心骨幹
                rigRotation("hips", riggedPose.Hips.rotation, 0.8, 0.25);
                rigRotation("spine", riggedPose.Spine, 1.0, 0.3);
                rigRotation("chest", riggedPose.Chest || riggedPose.Spine, 0.8, 0.3);

                // 手臂
                rigRotation("rightUpperArm", riggedPose.RightUpperArm, 1, 0.35);
                rigRotation("rightLowerArm", riggedPose.RightLowerArm, 1, 0.35);
                rigRotation("leftUpperArm", riggedPose.LeftUpperArm, 1, 0.35);
                rigRotation("leftLowerArm", riggedPose.LeftLowerArm, 1, 0.35);

                // 腿部（解決腳不動）
                rigRotation("rightUpperLeg", riggedPose.RightUpperLeg, 1, 0.3);
                rigRotation("rightLowerLeg", riggedPose.RightLowerLeg, 1, 0.3);
                rigRotation("leftUpperLeg", riggedPose.LeftUpperLeg, 1, 0.3);
                rigRotation("leftLowerLeg", riggedPose.LeftLowerLeg, 1, 0.3);

                // 可選：手腕
                if (riggedPose.RightHand) rigRotation("rightHand", riggedPose.RightHand, 1, 0.3);
                if (riggedPose.LeftHand) rigRotation("leftHand", riggedPose.LeftHand, 1, 0.3);
            }
        }

        // ==================== 4. 手指（手部細節） ====================
        if (results.rightHandLandmarks) {
            const riggedRightHand = Kalidokit.Hand.solve(results.rightHandLandmarks, "Right");
            if (riggedRightHand) applyHandFingers("Right", riggedRightHand);
        }
        if (results.leftHandLandmarks) {
            const riggedLeftHand = Kalidokit.Hand.solve(results.leftHandLandmarks, "Left");
            if (riggedLeftHand) applyHandFingers("Left", riggedLeftHand);
        }
    };

    // 手指 rigging 輔助函數
    function applyHandFingers(side, riggedHand) {
        const prefix = side.toLowerCase();
        const bones = ['Thumb', 'Index', 'Middle', 'Ring', 'Little'];
        const joints = ['Proximal', 'Intermediate', 'Distal'];

        bones.forEach(bone => {
            joints.forEach(joint => {
                const boneName = `${prefix}${bone}${joint}`;
                const rot = riggedHand[`${side}${bone}${joint}`];
                if (rot) rigRotation(boneName, rot, 1, 0.4);
            });
        });

        // Wrist
        const wristName = `${prefix}Hand`;
        if (riggedHand[`${side}Wrist`]) {
            rigRotation(wristName, riggedHand[`${side}Wrist`], 1, 0.35);
        }
    }

    // ... 其餘程式碼（holistic 初始化、startCameraButton 等）保持不變 ...
</script>
