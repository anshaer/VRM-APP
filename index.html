<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VRM Live Studio</title>
  <style>
    :root {
      --choc: #3B2313;
      --mint: #98FF98;
      --mint-dark: #70D070;
      --bg-dark: #2A180D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-dark); color: var(--mint); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* 9:16 直式畫布容器 */
    #canvas-container {
      width: 100%;
      max-width: 50vh; /* 確保在寬螢幕也能維持比例 */
      aspect-ratio: 9 / 16;
      background-color: #000;
      position: relative;
      margin: 0 auto;
    }
    canvas { width: 100%; height: 100%; display: block; }
    
    /* YouTube 聊天室疊加層 */
    #chat-overlay {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
      background: rgba(59, 35, 19, 0.6); pointer-events: none; border-top: 1px solid var(--mint);
    }
    #chat-iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }

    /* 控制面板 */
    #controls {
      flex: 1; padding: 15px; background: var(--choc); border-top: 3px solid var(--mint);
      display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    }
    .input-group { display: flex; flex-direction: column; gap: 5px; }
    input[type="text"] {
      padding: 10px; border: 1px solid var(--mint); background: var(--bg-dark); color: #fff; border-radius: 5px;
    }
    .btn-row { display: flex; gap: 10px; }
    button {
      flex: 1; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer;
      border: none; border-radius: 8px; transition: 0.2s;
    }
    .btn-mint { background: var(--mint); color: var(--choc); }
    .btn-mint:active { background: var(--mint-dark); }
    .btn-danger { background: #FF6B6B; color: white; }
    
    /* 隱藏原生檔案輸入 */
    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <div id="canvas-container">
    <div id="chat-overlay">
      <iframe id="chat-iframe" src=""></iframe>
    </div>
  </div>

  <div id="controls">
    <div class="input-group">
      <label>YouTube 直播金鑰 (RTMP Key)</label>
      <input type="text" id="stream-key" placeholder="輸入金鑰...">
    </div>
    <div class="input-group">
      <label>YouTube Video ID (用於載入聊天室)</label>
      <input type="text" id="video-id" placeholder="輸入 Video ID..." onchange="updateChat()">
    </div>
    
    <div class="btn-row">
      <button class="btn-mint" onclick="document.getElementById('vrm-upload').click()">載入 VRM</button>
      <input type="file" id="vrm-upload" accept=".vrm" onchange="loadVRM(event)">
      
      <button class="btn-mint" onclick="document.getElementById('bg-upload').click()">載入背景</button>
      <input type="file" id="bg-upload" accept="image/*" onchange="loadBackground(event)">
    </div>

    <div class="btn-row" style="margin-top: 10px;">
      <button class="btn-mint" id="btn-start" onclick="toggleStream('start')">開播 (Start)</button>
      <button class="btn-danger" id="btn-stop" onclick="toggleStream('stop')" disabled>下播 (Stop)</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
    // 防誤觸與聊天室邏輯
    let isStreaming = false;
    
    function updateChat() {
      const vid = document.getElementById('video-id').value;
      if(vid) {
        // 注意：需替換為你實際部署的網域
        document.getElementById('chat-iframe').src = `https://www.youtube.com/live_chat?v=${vid}&embed_domain=${window.location.hostname}`;
      }
    }

    function toggleStream(action) {
      if (action === 'start') {
        const key = document.getElementById('stream-key').value;
        if (!key) return alert("請先輸入 YouTube 金鑰！");
        if (confirm("確認要開始直播嗎？")) {
          isStreaming = true;
          document.getElementById('btn-start').disabled = true;
          document.getElementById('btn-stop').disabled = false;
          // 觸發 WebRTC 擷取與傳送邏輯 (需搭配後端 Node.js)
          window.dispatchEvent(new CustomEvent('start-streaming', { detail: { key } }));
        }
      } else {
        if (confirm("防誤觸確認：確定要中斷直播下播嗎？")) {
          isStreaming = false;
          document.getElementById('btn-start').disabled = false;
          document.getElementById('btn-stop').disabled = true;
          window.dispatchEvent(new Event('stop-streaming'));
        }
      }
    }
  </script>
</body>
</html>
