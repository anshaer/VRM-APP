<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>VRM 動作捕捉網頁 (含骨架顯示)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; }
        #ui-container { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #video-container { position: absolute; bottom: 10px; left: 10px; z-index: 10; border: 2px solid #fff; border-radius: 8px; overflow: hidden; background-color: #000; }
        
        /* 隱藏真實影片，只顯示畫出骨架的 Canvas */
        video { display: none; } 
        canvas.output_canvas { display: block; width: 320px; height: 240px; transform: scaleX(-1); /* 鏡像翻轉 */ }
        
        button, input { margin-top: 10px; font-size: 14px; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>
    <div id="ui-container">
        <h3>VRM Web VTuber</h3>
        <label>1. 選擇本地 VRM 檔案：</label><br>
        <input type="file" id="vrm-upload" accept=".vrm"><br>
        <button id="start-camera" disabled>2. 啟動攝影機</button>
        <div id="status" style="margin-top: 10px; font-weight: bold; color: #555;">請先載入模型...</div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas class="output_canvas" id="output-canvas" width="640" height="480"></canvas>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        let currentVrm = null;
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startCameraButton = document.getElementById('start-camera');
        const statusText = document.getElementById('status');

        // ==========================================
        // [階段一] 設定 3D 場景與載入 VRM
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.3, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 2.0);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0);

        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        document.getElementById('vrm-upload').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusText.innerText = "載入模型中...";
            statusText.style.color = "#d97706";
            const url = URL.createObjectURL(file);

            loader.load(url, (gltf) => {
                if (currentVrm) scene.remove(currentVrm.scene); 
                currentVrm = gltf.userData.vrm;
                currentVrm.scene.rotation.y = Math.PI;
                scene.add(currentVrm.scene);

                statusText.innerText = "模型載入成功！可以啟動攝影機了。";
                statusText.style.color = "#16a34a";
                startCameraButton.disabled = false; 
            });
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // [階段二] 動作捕捉、骨架繪製與模型連動
        // ==========================================

        const rigRotation = (boneName, rads, damp = 1, slerp = 0.1) => {
            if (!currentVrm || !rads) return;
            const boneNode = currentVrm.humanoid.getNormalizedBoneNode(boneName);
            if (!boneNode) return;
            const euler = new THREE.Euler(rads.x * damp, rads.y * damp, rads.z * damp);
            const quaternion = new THREE.Quaternion().setFromEuler(euler);
            boneNode.quaternion.slerp(quaternion, slerp);
        };

        const onResults = (results) => {
            // --- 1. 繪製辨識結果到 Canvas ---
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            // 畫出原本的鏡頭畫面當底圖
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 畫出臉部網格 (藍色)
            if (results.faceLandmarks) {
                drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
            }
            // 畫出身體骨架 (綠色/紅色)
            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
            }
            // 畫出雙手 (紫色/橘色)
            if (results.leftHandLandmarks) {
                drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#CC0000', lineWidth: 5});
            }
            if (results.rightHandLandmarks) {
                drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#00CC00', lineWidth: 5});
            }
            canvasCtx.restore();

            // --- 2. 驅動 VRM 模型 ---
            if (!currentVrm) return;

            if (results.faceLandmarks) {
                const riggedFace = Kalidokit.Face.solve(results.faceLandmarks, { runtime: "mediapipe", video: videoElement });
                rigRotation("neck", riggedFace.head, 0.7); 
                rigRotation("head", riggedFace.head, 0.7); 
                
                currentVrm.expressionManager.setValue('blinkLeft', riggedFace.eye.l);
                currentVrm.expressionManager.setValue('blinkRight', riggedFace.eye.r);
                currentVrm.expressionManager.setValue('aa', riggedFace.mouth.shape.A);
                currentVrm.expressionManager.setValue('ih', riggedFace.mouth.shape.I);
                currentVrm.expressionManager.setValue('ou', riggedFace.mouth.shape.U);
                currentVrm.expressionManager.setValue('ee', riggedFace.mouth.shape.E);
                currentVrm.expressionManager.setValue('oh', riggedFace.mouth.shape.O);
            }

            const pose3D = results.ea || results.poseWorldLandmarks;
            if (pose3D && results.poseLandmarks) {
                const riggedPose = Kalidokit.Pose.solve(pose3D, results.poseLandmarks, { runtime: "mediapipe", video: videoElement });
                rigRotation("rightUpperArm", riggedPose.RightUpperArm, 1, 0.3);
                rigRotation("rightLowerArm", riggedPose.RightLowerArm, 1, 0.3);
                rigRotation("leftUpperArm", riggedPose.LeftUpperArm, 1, 0.3);
                rigRotation("leftLowerArm", riggedPose.LeftLowerArm, 1, 0.3);
            }
        };

        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });
        holistic.setOptions({
            modelComplexity: 1, 
            smoothLandmarks: true, 
            minDetectionConfidence: 0.7, 
            minTrackingConfidence: 0.7
        });
        holistic.onResults(onResults);

        startCameraButton.addEventListener('click', () => {
            statusText.innerText = "攝影機啟動中... 請直視鏡頭！";
            statusText.style.color = "#2563eb";
            startCameraButton.disabled = true;

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await holistic.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            cameraUtils.start();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
