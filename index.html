<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRM 動態捕捉 - 最終穩定版</title>
    <style>
        /* 1. 全局佈局：左側控制台，右側 3D 展示區 */
        body { margin: 0; display: flex; height: 100vh; background-color: #1a1a1a; font-family: sans-serif; overflow: hidden; }
        
        /* 左側 UI 面板 */
        #ui-panel {
            width: 320px; background: #f8fafc; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; overflow-y: auto; z-index: 10;
        }

        /* 右側 3D 容器 */
        #render-area {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; background: #27272a;
        }

        /* 9:16 顯示區塊 */
        #viewport-916 {
            position: relative; width: 100%; max-height: 100%; aspect-ratio: 9 / 16;
            background-color: #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* 3D 畫布與背景圖圖層設定 */
        #bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; display: none;
        }
        canvas#three-canvas {
            position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important;
            z-index: 2; pointer-events: auto; /* 確保能拖拉模型 */
        }

        /* UI 元件樣式 */
        .control-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #cbd5e1; }
        h3 { margin-top: 0; color: #1e293b; font-size: 18px; }
        label.section-title { font-weight: bold; color: #334155; display: block; margin-bottom: 5px; font-size: 14px; }
        button, input[type="file"] { width: 100%; margin-top: 5px; padding: 8px; font-size: 13px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .slider-row { display: flex; flex-direction: column; margin-top: 8px; }
        .slider-row label { font-size: 12px; color: #475569; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; margin-top: 4px; }

        /* 左下角除錯區塊 */
        #debug-container {
            margin-top: auto; border: 2px solid #cbd5e1; border-radius: 8px; overflow: hidden;
            background: #000; width: 100%; aspect-ratio: 4/3; position: relative;
        }
        
        /* ⚠️ 【iOS 關鍵修正】 不要用 display:none，改用寬高為0隱藏真實影片，確保瀏覽器持續渲染抓取長寬 */
        video#video { position: absolute; width: 0; height: 0; visibility: hidden; } 
        canvas.output_canvas { width: 100%; height: 100%; display: block; transform: scaleX(-1); object-fit: cover; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h3>⚙️ 控制面板0000011111111</h3>
        
        <div class="control-group">
            <label class="section-title">1. 載入資源</label>
            <label style="font-size:12px;">模型 (.vrm):</label>
            <input type="file" id="vrm-upload" accept=".vrm">
            <label style="font-size:12px; margin-top:8px; display:block;">背景圖片 (可選):</label>
            <input type="file" id="bg-upload" accept="image/*">
        </div>

        <div class="control-group">
            <label class="section-title">2. 畫面調整</label>
            <div class="slider-row"><label>陰影補光: <span id="ambient-val">0.6</span></label><input type="range" id="ambient-slider" min="0" max="2" step="0.1" value="0.6"></div>
            <div class="slider-row"><label>主要光源: <span id="dir-val">1.0</span></label><input type="range" id="dir-slider" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="slider-row"><label>曝光度: <span id="exp-val">0.8</span></label><input type="range" id="exp-slider" min="0" max="3" step="0.1" value="0.8"></div>
        </div>

        <div class="control-group">
            <label class="section-title">3. 啟動捕捉</label>
            <button id="start-camera" disabled>啟動攝影機</button>
            <div id="status" style="margin-top: 10px; font-size: 13px; font-weight: bold; color: #d97706;">1. 請先載入 VRM 模型</div>
        </div>

        <label class="section-title">鏡頭預覽</label>
        <div id="debug-container">
            <video id="video" playsinline autoplay muted></video>
            <canvas class="output_canvas" id="output-canvas"></canvas>
        </div>
    </div>

    <div id="render-area">
        <div id="viewport-916">
            <img id="bg-image" src="" alt="">
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        // --- 全局變數 ---
        let currentVrm = null;
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status');
        const viewport = document.getElementById('viewport-916');

        // ==========================================
        // 模組 1: Three.js 場景建構
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, viewport.clientWidth / viewport.clientHeight, 0.1, 1000);
        camera.position.set(0, 1.3, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.domElement.id = 'three-canvas';
        renderer.setSize(viewport.clientWidth, viewport.clientHeight);
        renderer.setClearColor(0x000000, 0); 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.8;
        viewport.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(1.0, 2.0, 1.0).normalize();
        scene.add(directionalLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0);

        // 響應式 9:16 容器縮放
        new ResizeObserver(() => {
            camera.aspect = viewport.clientWidth / viewport.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
        }).observe(viewport);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 模組 2: UI 與檔案載入邏輯
        // ==========================================
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        document.getElementById('vrm-upload').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            statusText.innerText = "⏳ 載入模型中...";
            statusText.style.color = "#d97706";
            
            loader.load(URL.createObjectURL(file), (gltf) => {
                if (currentVrm) scene.remove(currentVrm.scene); 
                currentVrm = gltf.userData.vrm;
                currentVrm.scene.rotation.y = Math.PI;
                scene.add(currentVrm.scene);

                statusText.innerText = "2. 模型就緒，請點擊啟動攝影機";
                statusText.style.color = "#16a34a";
                document.getElementById('start-camera').disabled = false; 
            });
        });

        document.getElementById('bg-upload').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const imgEl = document.getElementById('bg-image');
            imgEl.src = URL.createObjectURL(file);
            imgEl.style.display = 'block';
        });

        const bindSlider = (id, valId, callback) => {
            document.getElementById(id).addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById(valId).innerText = val.toFixed(1);
                callback(val);
            });
        };
        bindSlider('ambient-slider', 'ambient-val', (val) => ambientLight.intensity = val);
        bindSlider('dir-slider', 'dir-val', (val) => directionalLight.intensity = val);
        bindSlider('exp-slider', 'exp-val', (val) => renderer.toneMappingExposure = val);

        // ==========================================
        // 模組 3: 核心捕捉與骨架連動邏輯
        // ==========================================
        const rigRotation = (boneName, rads, damp = 1, slerp = 0.1) => {
            if (!currentVrm || !rads) return;
            const boneNode = currentVrm.humanoid.getNormalizedBoneNode(boneName);
            if (!boneNode) return;
            boneNode.quaternion.slerp(new THREE.Quaternion().setFromEuler(new THREE.Euler(rads.x * damp, rads.y * damp, rads.z * damp)), slerp);
        };

        const onResults = (results) => {
            // 同步 Canvas 大小與真實鏡頭
            if(canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            // 繪製除錯骨架
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            if (results.faceLandmarks) drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
            if (results.poseLandmarks) drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            if (results.leftHandLandmarks) drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#CC0000', lineWidth: 3});
            if (results.rightHandLandmarks) drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#00CC00', lineWidth: 3});
            canvasCtx.restore();

            if (!currentVrm) return;

            // 臉部與眨眼連動
            if (results.faceLandmarks && videoElement.videoWidth > 0) {
                // 【關鍵修正】明確傳入 imageSize 確保 Kalidokit 數學運算正確
                const riggedFace = Kalidokit.Face.solve(results.faceLandmarks, { 
                    runtime: "mediapipe", 
                    imageSize: { width: videoElement.videoWidth, height: videoElement.videoHeight } 
                });
                
                rigRotation("neck", riggedFace.head, 0.7); 
                rigRotation("head", riggedFace.head, 0.7); 
                
                // 【關鍵修正】強制二分法閾值判定，杜絕眼睛半開亂抖。 
                // Kalidokit eye 數值：完全睜開約0.8，閉上約0.2。我們抓 0.5 當界線。
                const isLeftClosed = riggedFace.eye.l < 0.5;
                const isRightClosed = riggedFace.eye.r < 0.5;
                currentVrm.expressionManager.setValue('blinkLeft', isLeftClosed ? 1 : 0);
                currentVrm.expressionManager.setValue('blinkRight', isRightClosed ? 1 : 0);
                
                currentVrm.expressionManager.setValue('aa', riggedFace.mouth.shape.A);
                currentVrm.expressionManager.setValue('ih', riggedFace.mouth.shape.I);
                currentVrm.expressionManager.setValue('ou', riggedFace.mouth.shape.U);
                currentVrm.expressionManager.setValue('ee', riggedFace.mouth.shape.E);
                currentVrm.expressionManager.setValue('oh', riggedFace.mouth.shape.O);
            }

            // 身體連動 (確保使用者站直入鏡)
            const pose3D = results.poseWorldLandmarks || results.ea;
            if (pose3D && results.poseLandmarks && videoElement.videoWidth > 0) {
                const riggedPose = Kalidokit.Pose.solve(pose3D, results.poseLandmarks, { 
                    runtime: "mediapipe", 
                    imageSize: { width: videoElement.videoWidth, height: videoElement.videoHeight } 
                });
                if (riggedPose) {
                    rigRotation("rightUpperArm", riggedPose.RightUpperArm, 1, 0.3);
                    rigRotation("rightLowerArm", riggedPose.RightLowerArm, 1, 0.3);
                    rigRotation("leftUpperArm", riggedPose.LeftUpperArm, 1, 0.3);
                    rigRotation("leftLowerArm", riggedPose.LeftLowerArm, 1, 0.3);
                    rigRotation("spine", riggedPose.Spine, 1, 0.3);
                }
            }

            // 手腕轉動
            if (results.rightHandLandmarks) {
                const riggedRightHand = Kalidokit.Hand.solve(results.rightHandLandmarks, "Right");
                if (riggedRightHand) rigRotation("rightHand", riggedRightHand.RightWrist, 1, 0.3);
            }
            if (results.leftHandLandmarks) {
                const riggedLeftHand = Kalidokit.Hand.solve(results.leftHandLandmarks, "Left");
                if (riggedLeftHand) rigRotation("leftHand", riggedLeftHand.LeftWrist, 1, 0.3);
            }
        };

        // ==========================================
        // 模組 4: 啟動 MediaPipe 與 攝影機
        // ==========================================
        const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
        holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        holistic.onResults(onResults);

        document.getElementById('start-camera').addEventListener('click', async () => {
            const btn = document.getElementById('start-camera');
            btn.disabled = true;
            statusText.innerText = "⏳ 請求鏡頭權限中...";

            try {
                // 讓 iOS 自行決定最適合的解析度，僅強制前置鏡頭
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                videoElement.srcObject = stream;
                await videoElement.play();

                // 等待影片讀取到實際的長寬資料
                await new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => { resolve(); };
                });

                statusText.innerText = "🟢 動作捕捉中！(請確保上半身入鏡)";
                statusText.style.color = "#16a34a";

                // 開始影像分析迴圈
                async function captureFrame() {
                    if (!videoElement.paused && !videoElement.ended) {
                        await holistic.send({ image: videoElement });
                    }
                    requestAnimationFrame(captureFrame);
                }
                captureFrame();

            } catch (error) {
                console.error("Camera access failed:", error);
                statusText.innerText = "❌ 無法存取鏡頭！請檢查 Safari 設定";
                statusText.style.color = "red";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
