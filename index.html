<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRoid Hub API Immersive VTuber</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #render-area { width: 100vw; height: 100vh; position: relative; }
        
        /* 懸浮控制選單 */
        #floating-menu {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            display: flex; gap: 15px;
        }
        .icon-btn {
            width: 45px; height: 45px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.3); transition: 0.3s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); }
        .icon-btn.active { background: #22c55e; border-color: #fff; }

        /* 背景與畫布圖層 */
        #bg-image { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        canvas#three-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index:2; }
        
        /* 隱藏的攝影機與除錯區 */
        #hidden-camera { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
        #status-msg { position: absolute; bottom: 20px; left: 20px; color: white; z-index: 100; font-size: 14px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
    <script src="https://kit.fontawesome.com/your-font-awesome-key.js" crossorigin="anonymous"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div id="render-area">
        <img id="bg-image" src="" style="display:none;">
        <div id="floating-menu">
            <div class="icon-btn" id="login-hub" title="登入 VRoid Hub"><i class="fa-solid fa-user-circle"></i></div>
            <div class="icon-btn" id="toggle-bg" title="切換背景"><i class="fa-solid fa-image"></i></div>
            <div class="icon-btn" id="toggle-camera" title="開啟臉部追蹤"><i class="fa-solid fa-face-viewfinder"></i></div>
        </div>
        <div id="status-msg">正在初始化...</div>
        <video id="hidden-camera" playsinline autoplay muted></video>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE'; // 請填入您的 VRoid Hub Client ID
        let currentVrm = null, isTracking = false;
        const video = document.getElementById('hidden-camera');
        const status = document.getElementById('status-msg');

        // --- 1. Three.js 場景設定 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.domElement.id = 'three-canvas';
        document.getElementById('render-area').appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1, 2, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0);

        // --- 2. VRoid Hub API & OAuth 核心架構 ---
        // 注意：此部分需要處理 Redirect URI 邏輯
        document.getElementById('login-hub').addEventListener('click', () => {
            // 這裡應執行 OAuth 重定向，此處僅為邏輯示範
            status.innerText = "正在前往 VRoid Hub 授權頁面...";
            // window.location.href = `https://hub.vroid.com/oauth/authorize?client_id=${CLIENT_ID}&response_type=code...`;
        });

        // --- 3. 動作捕捉控制 (Face Icon 功能) ---
        const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
        holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true });
        
        holistic.onResults((results) => {
            if (!currentVrm || !results.faceLandmarks) return;
            const riggedFace = Kalidokit.Face.solve(results.faceLandmarks, { runtime: "mediapipe", imageSize: { width: 640, height: 480 } });
            
            // 應用旋轉與表情
            const head = currentVrm.humanoid.getNormalizedBoneNode('head');
            if (head) head.quaternion.slerp(new THREE.Quaternion().setFromEuler(new THREE.Euler(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z)), 0.1);
            
            // 眨眼反轉邏輯
            currentVrm.expressionManager.setValue('blinkLeft', riggedFace.eye.l < 0.5 ? 1 : 0);
            currentVrm.expressionManager.setValue('blinkRight', riggedFace.eye.r < 0.5 ? 1 : 0);
            currentVrm.expressionManager.setValue('aa', riggedFace.mouth.shape.A);
        });

        document.getElementById('toggle-camera').addEventListener('click', async function() {
            if (!isTracking) {
                status.innerText = "啟動追蹤中...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.play();
                isTracking = true;
                this.classList.add('active');
                
                async function loop() {
                    if (isTracking) { await holistic.send({ image: video }); requestAnimationFrame(loop); }
                }
                loop();
            } else {
                isTracking = false;
                this.classList.remove('active');
                status.innerText = "追蹤已停止";
            }
        });

        // --- 渲染迴圈 ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        status.innerText = "系統已就緒，請登入 VRoid Hub 載入角色。";
    </script>
</body>
</html>

這份代碼提供了一個專業的極簡化起點。您可以透過註冊 VRoid Hub Developer 應用程式來完成授權部分的重定向與 Token 交換。希望這能完美符合您的需求！
